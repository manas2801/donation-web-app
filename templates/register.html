<!DOCTYPE html>
<html>
<head>
    <title>Register | Donation Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-card {
            width: 420px;
            background: white;
            padding: 38px;
            border-radius: 24px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.3);
            text-align: center;
        }

        .logo {
            width: 75px;
            height: 75px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            margin: auto;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 34px;
            margin-bottom: 18px;
        }

        h2 {
            margin-bottom: 8px;
            color: #222;
        }

        p {
            color: #666;
            margin-bottom: 22px;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 14px;
            border-radius: 12px;
            border: 1px solid #ccc;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
        }

        a {
            color: #11998e;
            text-decoration: none;
            font-weight: bold;
        }

        .msg {
            color: red;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .bottom {
            margin-top: 18px;
            color: #666;
        }
    </style>
</head>
<body>

<div class="register-card">
    <div class="logo">+</div>

    <h2>Create Account</h2>
    <p>Register to access donation portal</p>

    {% for message in messages %}
        <div class="msg">{{ message }}</div>
    {% endfor %}

    <form method="post">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="email" name="email" placeholder="Enter Email" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>

        <button type="submit">Register</button>
    </form>

    <div class="bottom">
        Already have account?
        <a href="{% url 'login' %}">Login</a>
    </div>
</div>

</body>
</html>
